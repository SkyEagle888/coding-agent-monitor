name: Coding Agent Monitor

on:
  schedule:
    # Daily at 02:15 UTC (10:15 HKT) — for testing schedule trigger
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python monitor.py
        id: monitor

      - name: Create issues for consecutive fetch failures
        uses: actions/github-script@v8
        if: always()
        env:
          ISSUES_DATA: ${{ steps.monitor.outputs.issues }}
        with:
          script: |
            const fs = require('fs');
            const issuesFile = '/tmp/issues_to_create.json';

            if (fs.existsSync(issuesFile)) {
              const issues = JSON.parse(fs.readFileSync(issuesFile, 'utf8'));

              // Get existing open issues
              const { data: existingIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'fetch-failure'
              });

              for (const issue of issues) {
                // Check if issue already exists
                const existing = existingIssues.find(i => i.title === issue.title);
                if (!existing) {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issue.title,
                    body: issue.body,
                    labels: issue.labels
                  });
                  console.log(`Created issue: ${issue.title}`);
                } else {
                  console.log(`Issue already exists: ${issue.title}`);
                }
              }
            }

- name: Commit and push changes
  run: |
    git config --local user.email "github-actions[bot]@users.noreply.github.com"
    git config --local user.name "github-actions[bot]"
    git add versions.json RELEASES.md CHANGELOG.md .fetch_failures.json
    if git diff --staged --quiet; then
      echo "No changes to commit"
    else
      git commit -m "[skip ci] Update versions, releases, and changelog"
      git push
    fi

  deploy:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            RELEASES.md
            CHANGELOG.md
            versions.json

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
