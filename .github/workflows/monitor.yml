name: Coding Agent Monitor

on:
  schedule:
    # Daily at 02:15 UTC (10:15 HKT) — for testing schedule trigger
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python monitor.py
        id: monitor

      - name: Create issues for consecutive fetch failures
        uses: actions/github-script@v8
        if: always()
        env:
          ISSUES_DATA: ${{ steps.monitor.outputs.issues }}
        with:
          script: |
            const fs = require('fs');
            const issuesFile = '/tmp/issues_to_create.json';

            if (fs.existsSync(issuesFile)) {
              const issues = JSON.parse(fs.readFileSync(issuesFile, 'utf8'));

              // Get existing open issues
              const { data: existingIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'fetch-failure'
              });

              for (const issue of issues) {
                // Check if issue already exists
                const existing = existingIssues.find(i => i.title === issue.title);
                if (!existing) {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issue.title,
                    body: issue.body,
                    labels: issue.labels
                  });
                  console.log(`Created issue: ${issue.title}`);
                } else {
                  console.log(`Issue already exists: ${issue.title}`);
                }
              }
            }

  deploy-cloudflare:
    needs: monitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create wrangler config
        run: |
          cat > wrangler.jsonc << 'EOF'
          {
            "name": "coding-agent-monitor",
            "compatibility_date": "2025-09-27",
            "assets": { "directory": "." },
            "compatibility_flags": ["nodejs_compat"]
          }
          EOF

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3.99.0 deploy
